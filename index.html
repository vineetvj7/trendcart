<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASE */
body {
  background: linear-gradient(180deg,#020617,#0f172a);
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER */
.header {
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#020617;
}

/* CATEGORY BAR */
#categoryBar {
  display:flex;
  overflow:auto;
  padding:10px;
  gap:10px;
}

#categoryBar button {
  background:#1e293b;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  cursor:pointer;
  white-space:nowrap;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px) scale(1.02);
}

/* BADGE */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
}

/* IMAGE */
.image-box {
  height:160px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.image-box img {
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* CONTENT */
.content {
  padding:10px;
}

/* TITLE */
.content h3 {
  font-size:14px;
  height:40px;
  overflow:hidden;
}

/* RATING */
.rating {
  color:#facc15;
  font-size:13px;
  margin-top:5px;
}

.rating span {
  color:#94a3b8;
  font-size:11px;
}

/* PRICE */
.price-row {
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:6px;
}

.price {
  color:#22c55e;
  font-weight:bold;
  font-size:16px;
}

.old-price {
  text-decoration:line-through;
  color:#94a3b8;
  font-size:12px;
}

/* BUTTON */
.btn {
  display:block;
  background:linear-gradient(90deg,#16a34a,#22c55e);
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
  color:white;
}

/* SHARE */
.share {
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:8px;
}

.share button {
  background:#334155;
  border:none;
  padding:6px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  .grid { grid-template-columns:repeat(2,1fr); }
}

</style>

</head>

<body>

<div class="header">🔥 Trending Deals</div>

<div id="categoryBar"></div>
<div id="products" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const app = initializeApp({
 apiKey:"AIzaSyAfRb-kddB4m6g7Jo7F29kKUwgzVKEjMyk",
 authDomain:"trendcart-5861e.firebaseapp.com",
 projectId:"trendcart-5861e"
});

const db = getFirestore(app);

let all=[];

/* FETCH DATA */
const snap = await getDocs(collection(db,"products"));

snap.forEach(doc=>{
 all.push({...doc.data(), id:doc.id});
});

/* CATEGORY BUILD */
let cats = new Set();
all.forEach(p => p.category && cats.add(p.category));

let cHTML = `<button onclick="filter('all')">All</button>`;
cats.forEach(c => cHTML += `<button onclick="filter('${c}')">${c}</button>`);

document.getElementById("categoryBar").innerHTML = cHTML;

/* DISPLAY */
function show(data){
 let html="";

 data.forEach(p=>{
  let redirectLink = `redirect.html?url=${encodeURIComponent(p.link)}&id=${p.id}`;

  html += `
   <div class="card">

    <div class="badge">🔥 Trending</div>

    <div class="image-box">
      <img src="${p.image}">
    </div>

    <div class="content">

      <h3>${(p.name || "").slice(0,60)}</h3>

      <div class="rating">
        ⭐ ${p.rating || 4.3} <span>(${p.reviews || "1k"} reviews)</span>
      </div>

      <div class="price-row">
        <span class="price">₹${p.price || ""}</span>
        <span class="old-price">₹${Math.floor((p.price||1000)*1.4)}</span>
      </div>

      <a class="btn" href="${redirectLink}">
        Buy Now
      </a>

      <div class="share">
        <button onclick="shareWhatsApp('${p.name}','${p.link}')">📱</button>
        <button onclick="shareTelegram('${p.name}','${p.link}')">📢</button>
        <button onclick="copyLink('${p.link}')">🔗</button>
      </div>

    </div>

   </div>
  `;
 });

 document.getElementById("products").innerHTML = html;
}

/* FILTER */
window.filter = (c) => {
 if(c==="all") show(all);
 else show(all.filter(p => p.category === c));
};

/* SHARE FUNCTIONS (AMAZON LINK ONLY) */
window.shareWhatsApp = (name, link) => {
 let url = `https://wa.me/?text=${encodeURIComponent("🔥 " + name + " 👉 " + link)}`;
 window.open(url, '_blank');
};

window.shareTelegram = (name, link) => {
 let url = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(name)}`;
 window.open(url, '_blank');
};

window.copyLink = (link) => {
 navigator.clipboard.writeText(link);
 alert("Amazon link copied!");
};

/* INIT */
show(all);

</script>

</body>
</html>
