<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Trending Deals</title>

<style>

/* BASE */
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#020617;
}

/* SEARCH */
.search-box {
  padding:10px;
}
.search-box input {
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  font-size:14px;
}

/* CATEGORY */
#categoryBar {
  display:flex;
  overflow:auto;
  gap:10px;
  padding:10px;
}
#categoryBar button {
  background:#1e293b;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* IMAGE */
.image-box {
  width:100%;
  aspect-ratio:1/1;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}
.image-box img {
  max-width:90%;
  max-height:90%;
  object-fit:contain;
}

/* CONTENT */
.content {
  padding:10px;
  display:flex;
  flex-direction:column;
  flex-grow:1;
}

.content h3 {
  font-size:14px;
  height:40px;
  overflow:hidden;
}

/* PRICE */
.price {
  color:#22c55e;
  font-weight:bold;
  font-size:16px;
}

/* BUTTON */
.btn {
  display:block;
  background:#16a34a;
  text-align:center;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* SHARE */
.share {
  margin-top:10px;
}
.share button {
  width:100%;
  background:#25D366;
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* FOOTER */
.footer {
  padding:20px;
}
.footer div {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.footer span {
  background:#1e293b;
  padding:8px 12px;
  border-radius:20px;
}

</style>

</head>

<body>

<div class="header">🔥 Trending Deals</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search deals...">
</div>

<div id="categoryBar"></div>

<div id="products" class="grid"></div>

<div class="footer">
  <h3>Categories</h3>
  <div id="footerCats"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
 apiKey:"AIzaSyAfRb-kddB4m6g7Jo7F29kKUwgzVKEjMyk",
 authDomain:"trendcart-5861e.firebaseapp.com",
 projectId:"trendcart-5861e"
});

const db = getFirestore(app);

let all=[];

/* FETCH DATA */
const snap = await getDocs(collection(db,"products"));

snap.forEach(doc=>{
 all.push({...doc.data(), id:doc.id});
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",(e)=>{
 let val=e.target.value.toLowerCase();
 show(all.filter(p=> (p.name||"").toLowerCase().includes(val)));
});

/* CATEGORY */
let cats=new Set();
all.forEach(p=>p.category && cats.add(p.category));

let cHTML=`<button onclick="filter('all')">All</button>`;
cats.forEach(c=>cHTML+=`<button onclick="filter('${c}')">${c}</button>`);

document.getElementById("categoryBar").innerHTML=cHTML;

/* FOOTER */
document.getElementById("footerCats").innerHTML =
 [...cats].map(c=>`<span>${c}</span>`).join("");

/* PRODUCTS */
function show(data){
 let html="";
 data.forEach(p=>{
  html+=`
  <div class="card">

    <div class="image-box">
      <img src="${p.image}">
    </div>

    <div class="content">
      <h3>${p.name || ""}</h3>

      <div class="price">₹${p.price || ""}</div>

      <a class="btn" href="${p.link}" target="_blank">
        Buy Now
      </a>

      <div class="share">
        <button onclick="shareWhatsApp('${p.name}','${p.link}')">
          📱 Share on WhatsApp
        </button>
      </div>
    </div>

  </div>`;
 });

 document.getElementById("products").innerHTML=html;
}

/* FILTER */
window.filter=(c)=> c==="all"?show(all):show(all.filter(p=>p.category===c));

/* SHARE */
window.shareWhatsApp=(name,link)=>{
 let url=`https://wa.me/?text=${encodeURIComponent(name+" "+link)}`;
 window.open(url,'_blank');
};

/* INIT */
show(all);

</script>

</body>
</html>
