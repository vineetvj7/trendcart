<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Trending Deals</title>

<style>

/* BASE */
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#020617;
}

/* 🔍 STICKY SEARCH */
.search-wrapper {
  position:sticky;
  top:0;
  background:#0f172a;
  z-index:1000;
  padding:10px;
}

.search-box {
  position:relative;
}

.search-box input {
  width:100%;
  padding:10px 12px 10px 35px;
  border-radius:25px;
  border:none;
  font-size:14px;
  outline:none;
  background:#1e293b;
  color:white;
}

.search-icon {
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#94a3b8;
}

/* SUGGESTIONS */
.suggestions {
  background:#1e293b;
  margin-top:5px;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

.suggestions div {
  padding:10px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

.suggestions div:hover {
  background:#334155;
}

/* CATEGORY */
#categoryBar {
  display:flex;
  overflow:auto;
  gap:10px;
  padding:10px;
}

#categoryBar button {
  background:#1e293b;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* IMAGE */
.image-box {
  aspect-ratio:1/1;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.image-box img {
  max-width:90%;
  max-height:90%;
  object-fit:contain;
}

/* CONTENT */
.content {
  padding:10px;
  display:flex;
  flex-direction:column;
  min-height:120px;
}

/* TITLE FIX */
.content h3 {
  font-size:14px;
  line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* PRICE */
.price {
  color:#22c55e;
  font-weight:bold;
}

/* BUTTON */
.btn {
  background:#16a34a;
  padding:10px;
  text-align:center;
  border-radius:10px;
  color:white;
  text-decoration:none;
  margin-top:auto;
}

/* SHARE */
.share {
  display:flex;
  gap:8px;
  margin-top:10px;
}

.share button {
  flex:1;
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
}

.share button:first-child {
  background:#25D366;
}

.share button:last-child {
  background:#334155;
}

/* FOOTER */
.footer {
  padding:20px;
}

.footer div {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.footer span {
  background:#1e293b;
  padding:8px 12px;
  border-radius:20px;
}

</style>

</head>

<body>

<div class="header">🔥 Trending Deals</div>

<!-- 🔍 SEARCH -->
<div class="search-wrapper">

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search deals...">
  </div>

  <div id="suggestions" class="suggestions"></div>

</div>

<div id="categoryBar"></div>

<div id="products" class="grid"></div>

<div class="footer">
  <h3>Categories</h3>
  <div id="footerCats"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyAfRb-kddB4m6g7Jo7F29kKUwgzVKEjMyk",
 authDomain:"trendcart-5861e.firebaseapp.com",
 projectId:"trendcart-5861e"
});

const db = getFirestore(app);

let all=[];

/* FETCH */
const snap = await getDocs(collection(db,"products"));
snap.forEach(doc=> all.push({...doc.data(), id:doc.id}));

/* CATEGORY */
let cats=new Set();
all.forEach(p=>p.category && cats.add(p.category));

document.getElementById("categoryBar").innerHTML =
 `<button onclick="filter('all')">All</button>` +
 [...cats].map(c=>`<button onclick="filter('${c}')">${c}</button>`).join("");

document.getElementById("footerCats").innerHTML =
 [...cats].map(c=>`<span>${c}</span>`).join("");

/* SHOW */
function show(data){
 let html="";
 data.forEach(p=>{
  html+=`
  <div class="card">
    <div class="image-box">
      <img src="${p.image}">
    </div>

    <div class="content">
      <h3>${p.name || ""}</h3>
      <div class="price">₹${p.price || ""}</div>

      <a class="btn" href="${p.link}" target="_blank">Buy Now</a>

      <div class="share">
        <button onclick="shareWhatsApp('${p.name}','${p.link}')">📱</button>
        <button onclick="shareNative('${p.name}','${p.link}')">📤</button>
      </div>
    </div>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

/* FILTER */
window.filter=(c)=> c==="all"?show(all):show(all.filter(p=>p.category===c));

/* SEARCH */
const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input",(e)=>{
 let val=e.target.value.toLowerCase();

 if(!val){
  suggestions.style.display="none";
  show(all);
  return;
 }

 let filtered = all.filter(p=> (p.name||"").toLowerCase().includes(val));
 show(filtered);

 let top = filtered.slice(0,5);

 suggestions.innerHTML = top.map(p =>
  `<div onclick="selectItem('${p.name}')">${p.name}</div>`
 ).join("");

 suggestions.style.display="block";
});

window.selectItem=(name)=>{
 input.value=name;
 suggestions.style.display="none";
 show(all.filter(p=>p.name===name));
};

/* CLOSE SUGGESTIONS */
document.addEventListener("click",(e)=>{
 if(!e.target.closest(".search-wrapper")){
  suggestions.style.display="none";
 }
});

/* SHARE */
window.shareWhatsApp=(n,l)=>window.open(`https://wa.me/?text=${encodeURIComponent(n+" "+l)}`);
window.shareNative=(n,l)=>{
 if(navigator.share){
   navigator.share({title:n,url:l});
 } else {
   navigator.clipboard.writeText(l);
   alert("Link copied!");
 }
};

/* INIT */
show(all);

</script>

</body>
</html>
